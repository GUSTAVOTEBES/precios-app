<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Precios App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      text-align: center; /* 🔹 Centra todo el contenido */
    }
    h1, h2 {
      color: #333;
    }
    .form-group {
      margin-bottom: 10px;
    }
    label {
      display: block; /* 🔹 Hace que cada etiqueta esté encima del input */
      margin-bottom: 5px;
      font-weight: bold;
    }
    input {
      padding: 5px;
      width: 200px;
      text-align: center;
    }
    button {
      margin-top: 10px;
      padding: 8px 12px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    button:hover {
      background-color: #45a049;
    }
    #resultado {
      margin-top: 20px;
      font-weight: bold;
      color: #006600;
    }
  </style>
</head>
<body>
  <h1>Precios App</h1>

  <div class="form-group">
    <label>Ingrese Precio del dólar:</label>
    <input type="number" id="dolar">
  </div>

  <h2>Ingrese Avalúo de Productos por U$S/Kg</h2>
  <div class="form-group">
    <label>Picadura:</label><input type="number" id="picadura">
  </div>
  <div class="form-group">
    <label>Cogollo:</label><input type="number" id="cogollo">
  </div>
  <div class="form-group">
    <label>Cocaína:</label><input type="number" id="cocaina">
  </div>

  <h2>Ingrese Avalúo de Productos por U$S/Unidad</h2>
  <div class="form-group">
    <label>Plantas:</label><input type="number" id="plantas">
  </div>
  <div class="form-group">
    <label>Semillas:</label><input type="number" id="semillas">
  </div>
  <div class="form-group">
    <label>Éxtasis:</label><input type="number" id="extasis">
  </div>

  <button onclick="guardarPrecios()">Guardar precios</button>

  <h2>Cálculo</h2>
  <div class="form-group">
    <label>Ingrese Producto:</label><input type="text" id="producto">
  </div>
  <div class="form-group">
    <label>Ingrese Cantidad a calcular en Gramos o Unidades:</label><input type="number" id="cantidad">
  </div>

  <button onclick="calcular()">Calcular costo</button>

  <p id="resultado"></p>

  <script>
    let precios = {
      productos_kilo: { picadura: 0, cogollo: 0, cocaina: 0 },
      productos_unidad: { plantas: 0, semillas: 0, extasis: 0 },
      dolar: 0
    };

    function guardarPrecios() {
      precios.dolar = parseFloat(document.getElementById("dolar").value) || 0;
      precios.productos_kilo.picadura = parseFloat(document.getElementById("picadura").value) || 0;
      precios.productos_kilo.cogollo = parseFloat(document.getElementById("cogollo").value) || 0;
      precios.productos_kilo.cocaina = parseFloat(document.getElementById("cocaina").value) || 0;

      precios.productos_unidad.plantas = parseFloat(document.getElementById("plantas").value) || 0;
      precios.productos_unidad.semillas = parseFloat(document.getElementById("semillas").value) || 0;
      precios.productos_unidad.extasis = parseFloat(document.getElementById("extasis").value) || 0;

      alert("Precios guardados correctamente");
    }

    function calcular() {
      let prod = document.getElementById("producto").value.toLowerCase();
      let cantidad = parseFloat(document.getElementById("cantidad").value);
      let dolar = precios.dolar;
      let costo = 0;

      if (isNaN(cantidad)) {
        alert("Ingrese una cantidad válida");
        return;
      }

      if (precios.productos_kilo[prod] !== undefined) {
        costo = precios.productos_kilo[prod] * (cantidad / 1000) * dolar;
      } else if (precios.productos_unidad[prod] !== undefined) {
        costo = precios.productos_unidad[prod] * cantidad * dolar;
      } else {
        alert("Producto no encontrado");
        return;
      }

      document.getElementById("resultado").innerText = `Costo total en pesos: ${costo.toFixed(2)}`;
    }
  </script>
</body>
</html>
